{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Job | JobTracker</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">JobTracker</div>
        <div class="nav-links">
            <a href="{% url 'job_list' %}" class="btn btn-outline">Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="delete-card">
            <h2>Delete Application?</h2>
            <p class="subtitle">
                You are about to remove your application for
                <strong>{{ job.role_title }}</strong> at
                <strong>{{ job.company_name }}</strong>.
            </p>

            <div class="warning-box">
                <p>This action cannot be undone.</p>
            </div>

            <form method="post" class="delete-form">
                {% csrf_token %}
                <div class="form-actions">
                    <button type="submit" class="btn btn-danger">Yes, Delete It</button>
                    <a href="{% url 'job_list' %}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

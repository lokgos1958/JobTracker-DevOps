- name: Install dependencies
  run: |
    pip install -r requirements.txt
    pip install flake8 bandit

- name: Run Django checks
  run: |
    python manage.py check
    python manage.py makemigrations --check --dry-run

- name: Run tests
  run: |
    python manage.py test

- name: Run flake8
  run: flake8 .

- name: Run bandit
  run: bandit -r .